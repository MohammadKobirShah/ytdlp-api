services:
  ytdlp-api:
    build: .
    container_name: ytdlp-api
    ports:
      - "8000:8000"
    volumes:
      - ./downloads:/app/downloads
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - TUNNEL_ENABLED=true
      - MAX_CONCURRENT=5
      - CLEANUP_HOURS=24
      - MAX_TASKS_IN_MEMORY=1000
      - DOWNLOAD_TIMEOUT_SECONDS=1800
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
